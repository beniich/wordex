

services:
  # ─── SSL Certificate Generator ─────────────────────────────────
  init-ssl:
    image: alpine:latest
    container_name: wordex_ssl_init
    volumes:
      - ./docker/ssl:/etc/nginx/ssl
    entrypoint: >
      sh -c "
        apk add --no-cache openssl &&
        if [ ! -f /etc/nginx/ssl/fullchain.pem ]; then
          echo 'Generating AETHER-SELF-SIGNED certificates...' &&
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout /etc/nginx/ssl/privkey.pem \
            -out /etc/nginx/ssl/fullchain.pem \
            -subj '/C=FR/ST=Paris/L=Atelier/O=Wordex/CN=localhost'
        fi
      "
    networks:
      - wordex_net
    restart: "no"
  # ─── Ollama AI Agent ────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: wordex_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - wordex_net
    deploy:
      resources:
        reservations:
          memory: 2G

  # ─── Ollama Model Initializer ────────────────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: wordex_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: >
      sh -c "
        echo 'Pulling llama3.2:3b model...' &&
        ollama pull llama3.2:3b &&
        echo 'Pulling nomic-embed-text for embeddings...' &&
        ollama pull nomic-embed-text &&
        echo 'Models ready!'
      "
    networks:
      - wordex_net
    restart: "no"

  # ─── Redis Cache ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wordex_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - wordex_net

  # ─── PostgreSQL Database ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: wordex_db
    environment:
      POSTGRES_USER:     collab
      POSTGRES_PASSWORD: collab
      POSTGRES_DB:       collabdb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collab"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wordex_net

  # ─── MinIO Object Storage ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: wordex_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - wordex_net

  # ─── Backend (FastAPI) ────────────────────────────────────────────
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: wordex_backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-wordex-super-secret-key-change-in-prod}
      - DATABASE_URL=postgresql://collab:collab@db:5432/collabdb
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=false
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
      - ENVIRONMENT=development
    depends_on:
      - ollama
      - redis
      - db
    volumes:
      - ./back:/app
      - backend_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wordex_net

  # ─── WebSocket Sync Server (Hocuspocus) ───────────────────────────
  sync-server:
    image: node:20-alpine
    container_name: wordex_sync
    working_dir: /app
    ports:
      - "1234:1234"
    volumes:
      - ./sync-server:/app
    environment:
      - PORT=1234
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=development
    command: >
      sh -c "npm install && node server.js"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - wordex_net

  # ─── Frontend (Next.js) ───────────────────────────────────────────
  frontend:
    build:
      context: ./front/wordex-app
      dockerfile: Dockerfile
    container_name: wordex_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_OLLAMA_URL=http://localhost:11434
      - NEXT_PUBLIC_WS_URL=ws://localhost:1234
    depends_on:
      - backend
    volumes:
      - ./front/wordex-app:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    networks:
      - wordex_net

  # ─── Nginx Reverse Proxy ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: wordex_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
      - init-ssl
    restart: unless-stopped
    networks:
      - wordex_net

volumes:
  ollama_data:
  redis_data:
  backend_data:
  pg_data:
  minio_data:

networks:
  wordex_net:
    driver: bridge
