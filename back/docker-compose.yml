version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:     postgresql://collab:collab@db:5432/collabdb
      JWT_SECRET:       super-secret-change-me
      MINIO_ENDPOINT:   minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE:     "false"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  ws:
    build: .
    ports:
      - "1234:1234"
    environment:
      JWT_SECRET: super-secret-change-me
      WS_HOST:    0.0.0.0
      WS_PORT:    "1234"
    command: python ws_server.py

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     collab
      POSTGRES_PASSWORD: collab
      POSTGRES_DB:       collabdb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collab"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - ws

volumes:
  pg_data:
  minio_data:
